name: Agentic Notion Sync Engine

on:
  schedule:
    - cron: '0 5 * * *' # Executes daily at 5:00 AM UTC
  push:
    branches: [ main ] # Triggers AUTOMATICALLY on every push
  workflow_dispatch: # Allows manual trigger testing
  # Forces a cache break on script paths to sync.py instead of notion_sync_engine.py

jobs:
  sync-notion-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install Secure Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r cron/requirements.txt
        
    - name: Execute LangGraph Orchestrator
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        NOTION_APPS_DATABASE_ID: ${{ secrets.NOTION_APPS_DATABASE_ID }}
      run: |
        python cron/sync.py
        
    - name: Commit and Push CI/CD Updates
      run: |
        git config --global user.name "Notion LangGraph Bot"
        git config --global user.email "bot@saivardhan.com"
        git add src/utils/data.js
        # Pull latest commits before pushing to avoid fast-forward rejections
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Auto-sync GitOps database state from Notion UI" && git pull --rebase origin main && git push)
